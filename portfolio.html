<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Summit Sky Visuals</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

  <!-- Header -->
  <header class="border-b border-zinc-800 sticky top-0 bg-black/90 backdrop-blur z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

      <a href="index.html" class="text-2xl font-bold tracking-tight">
        Summit Sky Visuals
      </a>

      <nav class="flex gap-6 text-lg">
        <a href="index.html" class="hover:text-gray-300 transition">Home</a>
        <a href="portfolio.html" class="text-white font-semibold">Portfolio</a>
        <a href="index.html#contact" class="hover:text-gray-300 transition">Book</a>
      </nav>

    </div>
  </header>

  <!-- Hero -->
  <section class="py-32 px-6 text-center">
    <div class="max-w-4xl mx-auto">

      <h1 class="text-6xl md:text-8xl font-extrabold tracking-tight">
        Portfolio
      </h1>

      <p class="mt-8 text-xl text-gray-300 leading-relaxed">
        Professional photography and cinematic drone visuals across Minnesota.
      </p>

    </div>
  </section>

  <!-- Gallery -->
  <section class="pb-24 px-6">
    <div class="max-w-7xl mx-auto">

      <div class="grid md:grid-cols-3 gap-6">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1640672247485-1f3ad9d03894?w=500&auto=format&fit=crop&q=60">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1974&auto=format&fit=crop">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1974&auto=format&fit=crop">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1974&auto=format&fit=crop">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1964&auto=format&fit=crop">

        <img class="rounded-3xl h-[500px] w-full object-cover hover:scale-[1.02] transition duration-300"
          src="https://images.unsplash.com/photo-1473968512647-3e447244af8f?q=80&w=1974&auto=format&fit=crop">

      </div>

    </div>
  </section>

  <!-- CTA -->
  <section class="py-24 px-6 border-t border-zinc-800">
    <div class="max-w-4xl mx-auto text-center">

      <h2 class="text-5xl font-bold">
        Ready to Create Something Professional?
      </h2>

      <p class="mt-6 text-xl text-gray-300">
        Reach out to schedule your next shoot or request a custom quote.
      </p>

      <a href="index.html#contact"
        class="mt-10 bg-white text-black px-8 py-4 rounded-2xl text-lg font-semibold hover:scale-105 transition inline-block">
        Request a Quote
      </a>

    </div>
  </section>

  <!-- Footer -->
  <footer class="border-t border-zinc-800 py-8 text-center text-gray-500">
    © 2026 Summit Sky Visuals. All rights reserved.
  </footer>

</body>
</html>
