<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Session | Summit Sky Visuals</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

  <!-- Header -->
  <div class="text-center py-16 px-6">
    <h1 class="text-6xl font-extrabold">Book a Session</h1>
    <p class="mt-6 text-xl text-gray-300">
      Fill out the form below and we’ll get back to you within 24–48 hours.
    </p>
  </div>

  <!-- Form -->
  <section class="px-6 pb-24">
    <form action="https://formspree.io/f/xpqnpldk" method="POST"
      class="grid gap-6 max-w-3xl mx-auto text-left">

      <input type="hidden" name="_next" value="https://15425-tj.github.io/TJ.github.io/thank-you.html">

      <input name="name" type="text" placeholder="Full Name" required
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800" />

      <input name="email" type="email" placeholder="Email Address" required
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800" />

      <select name="service" required
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800">
        <option value="">What do you need?</option>
        <option>Real Estate / Property</option>
        <option>Wedding</option>
        <option>Senior Photos</option>
        <option>Drone Photography</option>
        <option>Event Coverage</option>
        <option value="other">Other</option>
      </select>

      <input name="custom_service" type="text"
        placeholder="If 'Other', describe your request"
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800" />

      <input name="location" type="text" placeholder="Shoot Location"
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800" />

      <select name="budget"
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800">
        <option value="">Budget Range</option>
        <option>Below $100</option>
        <option>$100 - $300</option>
        <option>$300 - $700</option>
        <option>$700 - $1500</option>
        <option>$1500+</option>
      </select>

      <textarea name="details" rows="5"
        placeholder="Tell us about your project..."
        class="w-full p-4 rounded-2xl bg-zinc-900 border border-zinc-800"></textarea>

      <button type="submit"
        class="bg-white text-black px-8 py-4 rounded-2xl text-lg font-semibold hover:scale-105 transition">
        Request Quote
      </button>

    </form>
  </section>

</body>
</html>
